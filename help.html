<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonorLink - Payment Gateway</title>
    <link rel="stylesheet" href="help.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
<div class="container">
    <form action="">
        <div class="row">
            <div class="column">
                <h3 class="title">Billing Address</h3>
                <div class="input-box">
                    <span>Full Name :</span>
                    <input type="text" placeholder="Amanbek Batyrzhan">
                </div>
                <div class="input-box">
                    <span>Email :</span>
                    <input type="email" placeholder="youremail@example.com">
                </div>
                <div class="input-box">
                    <span>Address :</span>
                    <input type="text" placeholder="Sultan Beibarys 10">
                </div>
                <div class="input-box">
                    <span>City :</span>
                    <input type="text" placeholder="Kyzylorda">
                </div>

                <div class="flex">
                    <div class="input-box">
                        <span>State :</span>
                        <input type="text" placeholder="Kazakhstan">
                    </div>
                    <div class="input-box">
                        <span>Zip Code :</span>
                        <input type="number" placeholder="123 456">
                    </div>
                </div>
            </div>

            <div class="column">
                <h3 class="title">Payment</h3>
                <div class="input-box">
                    <span>Cards Accepted :</span>
                    <img src="photos/cards.png" alt="">
                </div>
                <div class="input-box">
                    <span>Name On Card :</span>
                    <input type="text" placeholder="Amanbek Batyrzhan">
                </div>
                <div class="input-box">
                    <span>Credit Card Number :</span>
                    <input type="number" placeholder="1111 2222 3333 4444">
                </div>
                <div class="input-box">
                    <span>Exp. Month :</span>
                    <input type="text" placeholder="March">
                </div>

                <div class="flex">
                    <div class="input-box">
                        <span>Exp. Year :</span>
                        <input type="number" placeholder="2025">
                    </div>
                    <div class="input-box">
                        <span>CVV :</span>
                        <input type="number" placeholder="123">
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn">Submit</button>
    </form>
</div>

<!-- Footer -->
<div class="footer">
    <div class="fot-item active" onclick="setActive(this)">
        <a href="home.html"><i class='bx bxs-home-alt-2'></i><div>Home</div></a>
    </div>
    <div class="fot-item" onclick="setActive(this)">
        <a href="help.html"><i class='bx bx-donate-heart'></i><div>Help</div></a>
    </div>
    <div class="fot-item" onclick="setActive(this)">
        <a href="donations.html"><i class='bx bxs-droplet'></i><div>Donations</div></a>
    </div>
    <div class="fot-item" onclick="setActive(this)">
        <a href="locations.html"><i class='bx bxs-location-plus'></i><div>Locations</div></a>
    </div>
    <div class="fot-item" onclick="setActive(this)">
        <a href="profile.html"><i class='bx bx-user'></i><div>Profile</div></a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
